<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rung Chuông Vàng — Màn hình chính</title>
    <meta name="description" content="Màn hình chiếu chính cho Ban tổ chức cuộc thi Rung Chuông Vàng">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* ==================== TOKENS ==================== */
        :root {
            --gold: #ffd700;
            --gold-2: #ffb800;
            --gold-glow: rgba(255, 215, 0, 0.5);
            --blue: #1e90ff;
            --blue-dark: #0a5fd4;
            --blue-soft: rgba(30, 144, 255, 0.15);
            --red: #e63946;
            --red-soft: rgba(230, 57, 70, 0.15);
            --green: #22c55e;
            --green-soft: rgba(34, 197, 94, 0.15);
            --orange: #f97316;
            --bg: #05080f;
            --bg2: #080d1a;
            --card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.07);
            --text: #f1f5f9;
            --muted: #64748b;
            --font: 'Be Vietnam Pro', sans-serif;
            --font-d: 'Fredoka', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            color: var(--text);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 40% at 50% 0%, rgba(30,144,255,0.2) 0%, transparent 65%),
                radial-gradient(ellipse 60% 35% at 92% 95%, rgba(230,57,70,0.1) 0%, transparent 55%),
                radial-gradient(ellipse 55% 30% at 8% 95%, rgba(255,215,0,0.08) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .d-none { display: none !important; }

        /* ==================== TOP BAR ==================== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 20px;
            background: rgba(5, 8, 15, 0.82);
            border-bottom: 1px solid rgba(255, 215, 0, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            flex-wrap: wrap;
        }

        .bar-title {
            font-family: var(--font-d);
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-2), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .phase-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid;
            white-space: nowrap;
        }
        .chip-lobby  { background: var(--blue-soft);  color: var(--blue);  border-color: rgba(30,144,255,0.3); }
        .chip-q      { background: rgba(255,215,0,.12); color: var(--gold);  border-color: rgba(255,215,0,.3); }
        .chip-result { background: var(--green-soft); color: var(--green); border-color: rgba(34,197,94,.3); }
        .chip-end    { background: rgba(255,152,0,.12); color: var(--orange); border-color: rgba(255,152,0,.3); }

        .bar-stats {
            display: flex;
            gap: 18px;
            align-items: center;
            margin-left: auto;
        }
        .stat-item { text-align: center; }
        .stat-n {
            font-family: var(--font-d);
            font-size: 20px;
            font-weight: 700;
            line-height: 1;
        }
        .stat-l {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }
        .stat-div { width: 1px; height: 30px; background: var(--border); }
        .stat-joined .stat-n { color: var(--gold); }
        .stat-alive  .stat-n { color: var(--green); }
        .stat-dead   .stat-n { color: var(--red); }

        .bar-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: var(--font);
            font-size: 11.5px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .ctrl-btn:hover   { border-color: var(--gold); color: var(--gold); }
        .ctrl-btn.active  { background: rgba(255,215,0,.12); border-color: var(--gold); color: var(--gold); }
        .ctrl-btn.editing { background: rgba(230,57,70,.12); border-color: var(--red); color: var(--red); }
        .ctrl-btn.danger  { border-color: rgba(148,163,184,.3); color: var(--muted); }

        /* ==================== MAIN ==================== */
        .screen-main { padding: 16px 18px 28px; }

        /* ==================== LOBBY HEADING ==================== */
        .lobby-heading {
            text-align: center;
            padding: 10px 0 6px;
            margin-bottom: 10px;
        }
        .lobby-title {
            font-family: var(--font-d);
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lobby-sub {
            font-size: 16px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ==================== QUESTION PANEL ==================== */
        .q-panel {
            background: var(--card);
            border: 1px solid rgba(255,215,0,.14);
            border-radius: 20px;
            padding: 24px 30px;
            text-align: center;
            margin-bottom: 16px;
        }
        .big-timer {
            font-family: var(--font-d);
            font-size: 72px;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold-glow);
            line-height: 1;
            transition: color 0.3s;
        }
        .big-timer.urgent { color: var(--red); text-shadow: 0 0 30px rgba(230,57,70,0.6); }
        .q-text {
            font-size: 30px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.4;
            margin: 18px 0 20px;
        }
        .opt-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            max-width: 1060px;
            margin: 0 auto;
        }
        .opt-box {
            padding: 18px 22px;
            border-radius: 16px;
            font-size: 22px;
            font-weight: 700;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.45s cubic-bezier(0.16,1,0.3,1);
        }
        .opt-A { background: linear-gradient(135deg, rgba(230,57,70,.25), rgba(155,17,30,.12)); border-color: rgba(230,57,70,.4); color: #fca5a5; }
        .opt-B { background: linear-gradient(135deg, rgba(30,144,255,.25), rgba(10,95,212,.12)); border-color: rgba(30,144,255,.4); color: #93c5fd; }
        .opt-C { background: linear-gradient(135deg, rgba(34,197,94,.25), rgba(21,128,61,.12)); border-color: rgba(34,197,94,.4); color: #86efac; }
        .opt-D { background: linear-gradient(135deg, rgba(255,215,0,.2), rgba(180,150,0,.1)); border-color: rgba(255,215,0,.4); color: var(--gold); }
        .opt-box.reveal-correct {
            background: linear-gradient(135deg, #22c55e, #15803d) !important;
            border-color: #4ade80 !important;
            color: #fff !important;
            transform: scale(1.04);
            box-shadow: 0 0 50px rgba(34,197,94,0.6);
        }

        .answered-line {
            font-size: 18px;
            font-weight: 700;
            color: var(--muted);
            text-align: center;
            margin-top: 14px;
        }

        .result-bar {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 16px;
            padding: 18px 24px;
            background: rgba(255,255,255,.03);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .rb-item { text-align: center; }
        .rb-num {
            font-family: var(--font-d);
            font-size: 44px;
            font-weight: 700;
            line-height: 1;
        }
        .rb-label { font-size: 13px; color: var(--muted); margin-top: 3px; }
        .rb-alive .rb-num  { color: var(--green); text-shadow: 0 0 20px rgba(34,197,94,.4); }
        .rb-dead  .rb-num  { color: var(--red);   text-shadow: 0 0 20px rgba(230,57,70,.4); }
        .rb-now   .rb-num  { color: var(--orange); }

        /* ==================== WIN ==================== */
        .win-screen {
            text-align: center;
            padding: 60px 20px;
        }
        .win-emoji  { font-size: 80px; display: block; }
        .win-title  {
            font-family: var(--font-d);
            font-size: 56px;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 40px var(--gold-glow);
            margin-top: 16px;
        }
        .win-name   { font-size: 32px; font-weight: 800; color: var(--text); margin-top: 10px; }
        .win-unit   { font-size: 18px; color: var(--muted); margin-top: 6px; }

        /* ==================== SEAT GRID ==================== */
        .grid-section { margin-top: 12px; }
        .grid-container {
            display: grid;
            gap: 5px;
        }

        .seat-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            padding: 6px 4px 5px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.025);
            min-height: 72px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s, transform 0.2s, opacity 0.3s;
            cursor: default;
        }

        /* number */
        .cell-num {
            font-family: var(--font-d);
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            color: rgba(255,255,255,0.22);
            transition: color 0.3s;
        }
        /* name */
        .cell-name {
            font-size: 9px;
            font-weight: 600;
            color: var(--muted);
            text-align: center;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 92%;
            line-height: 1.25;
            transition: color 0.3s;
        }
        /* unit */
        .cell-unit {
            font-size: 7.5px;
            color: rgba(100,116,139,0.65);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 92%;
            margin-top: 1px;
        }

        /* ---- STATES ---- */
        .seat-cell.not_joined { opacity: 0.28; }
        .seat-cell.not_joined .cell-num { color: rgba(255,255,255,0.18); }

        .seat-cell.alive {
            background: rgba(30,144,255,0.1);
            border-color: rgba(30,144,255,0.35);
        }
        .seat-cell.alive .cell-num  { color: #60a5fa; }
        .seat-cell.alive .cell-name { color: var(--text); font-weight: 700; }

        .seat-cell.unanswered {
            background: rgba(249,115,22,0.13);
            border-color: rgba(249,115,22,0.45);
            animation: pulseOrange 1.6s ease-in-out infinite;
        }
        .seat-cell.unanswered .cell-num { color: var(--orange); }
        @keyframes pulseOrange {
            0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0); }
            50% { box-shadow: 0 0 0 3px rgba(249,115,22,0.3); }
        }

        .seat-cell.answered {
            background: rgba(34,197,94,0.14);
            border-color: rgba(34,197,94,0.5);
        }
        .seat-cell.answered .cell-num { color: #4ade80; }
        .seat-cell.answered::after {
            content: '✓';
            position: absolute;
            top: 3px;
            right: 5px;
            font-size: 13px;
            font-weight: 900;
            color: var(--green);
        }

        .seat-cell.eliminated {
            background: rgba(230,57,70,0.06);
            border-color: rgba(230,57,70,0.18);
            opacity: 0.48;
        }
        .seat-cell.eliminated .cell-num  { color: var(--red); text-decoration: line-through; }
        .seat-cell.eliminated .cell-name { text-decoration: line-through; opacity: 0.6; }

        @keyframes flashElim {
            0%   { background: rgba(230,57,70,0.75); transform: scale(1.1); border-color: var(--red); opacity: 1; }
            30%  { background: rgba(230,57,70,0.35); transform: scale(1.02); opacity: 1; }
            100% { background: rgba(230,57,70,0.06); transform: scale(1); border-color: rgba(230,57,70,0.18); opacity: 0.48; }
        }
        .seat-cell.died-this-round {
            animation: flashElim 2.5s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        .seat-cell.winner {
            background: rgba(255,215,0,0.18);
            border-color: var(--gold);
            box-shadow: 0 0 22px rgba(255,215,0,0.35);
        }
        .seat-cell.winner .cell-num { color: var(--gold); }

        /* ---- EDIT MODE ---- */
        .edit-mode-on .seat-cell {
            cursor: grab;
            border-style: dashed;
        }
        .edit-mode-on .seat-cell:hover {
            border-color: rgba(255,215,0,0.5);
            background: rgba(255,215,0,0.06);
        }
        .seat-cell.dragging { opacity: 0.35; transform: scale(0.94); }
        .seat-cell.drag-over {
            border-color: var(--gold) !important;
            background: rgba(255,215,0,0.18) !important;
            transform: scale(1.06);
        }

        /* ---- EDIT overlay label ---- */
        .edit-mode-on .seat-cell::before {
            content: '↕';
            position: absolute;
            bottom: 3px;
            right: 4px;
            font-size: 9px;
            color: rgba(255,215,0,0.4);
        }

        /* ==================== SLIDE UP ANIM ==================== */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .slide-up { animation: slideUp 0.55s cubic-bezier(0.16,1,0.3,1) both; }
    </style>
</head>

<body>

    <!-- ============================== TOP BAR ============================== -->
    <div class="top-bar">
        <div class="bar-title">🔔 RUNG CHUÔNG VÀNG</div>
        <div class="phase-chip chip-lobby" id="phaseChip">Phòng chờ</div>

        <div class="bar-stats">
            <div class="stat-item stat-joined">
                <div class="stat-n" id="statJoined">0</div>
                <div class="stat-l">Đã vào</div>
            </div>
            <div class="stat-div"></div>
            <div class="stat-item stat-alive">
                <div class="stat-n" id="statAlive">0</div>
                <div class="stat-l">Còn lại</div>
            </div>
            <div class="stat-div"></div>
            <div class="stat-item stat-dead">
                <div class="stat-n" id="statDead">0</div>
                <div class="stat-l">Bị loại</div>
            </div>
        </div>

        <div class="bar-controls">
            <button class="ctrl-btn active" id="btn13x10" onclick="setLayout(13,10)">13 × 10</button>
            <button class="ctrl-btn" id="btn10x13" onclick="setLayout(10,13)">10 × 13</button>
            <button class="ctrl-btn" id="editBtn" onclick="toggleEditMode()">✏️ Sắp xếp</button>
            <button class="ctrl-btn danger d-none" id="resetBtn" onclick="resetLayout()">↺ Đặt lại</button>
        </div>
    </div>

    <!-- ============================== MAIN ============================== -->
    <div class="screen-main">

        <!-- LOBBY HEADING -->
        <div id="lobbyView">
            <div class="lobby-heading slide-up">
                <div class="lobby-title">Đang chờ thí sinh vào phòng...</div>
                <div class="lobby-sub" id="lobbyCount">0 / 130 thí sinh đã đăng nhập</div>
            </div>
        </div>

        <!-- QUESTION + RESULT PANEL -->
        <div id="questionView" class="d-none">
            <div class="q-panel slide-up">
                <div class="big-timer" id="bigTimer">—</div>
                <div class="q-text" id="qText"></div>
                <div class="opt-grid">
                    <div class="opt-box opt-A" id="optA"></div>
                    <div class="opt-box opt-B" id="optB"></div>
                    <div class="opt-box opt-C" id="optC"></div>
                    <div class="opt-box opt-D" id="optD"></div>
                </div>
                <!-- Answered count (question phase) -->
                <div class="answered-line d-none" id="answeredLine"></div>
                <!-- Result stats (result phase) -->
                <div class="result-bar d-none" id="resultBar">
                    <div class="rb-item rb-alive">
                        <div class="rb-num" id="rbAlive">0</div>
                        <div class="rb-label">Còn lại</div>
                    </div>
                    <div class="rb-item rb-dead">
                        <div class="rb-num" id="rbDead">0</div>
                        <div class="rb-label">Tổng bị loại</div>
                    </div>
                    <div class="rb-item rb-now">
                        <div class="rb-num" id="rbNow">0</div>
                        <div class="rb-label">Vòng này</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FINISHED -->
        <div id="finishedView" class="d-none">
            <div class="win-screen slide-up">
                <span class="win-emoji">🏆</span>
                <div class="win-title">CHÚC MỪNG!</div>
                <div class="win-name" id="winName"></div>
                <div class="win-unit" id="winUnit"></div>
            </div>
        </div>

        <!-- SEAT GRID (luôn hiển thị) -->
        <div class="grid-section" id="gridSection">
            <div class="grid-container" id="seatGrid"></div>
        </div>

    </div><!-- /screen-main -->

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="clusters-data.js"></script>
    <script src="questions-data.js"></script>
    <script>
        'use strict';

        const el = id => document.getElementById(id);
        const TOTAL = 130;

        /* ============ LAYOUT STATE ============ */
        let gridCols = 13;
        let editMode = false;

        // seatLayout[displayPosition] = seatNumber (1–130)
        let seatLayout = loadLayout();

        function loadLayout() {
            try {
                const s = localStorage.getItem('rcv_layout');
                if (s) {
                    const a = JSON.parse(s);
                    if (Array.isArray(a) && a.length === TOTAL) return a;
                }
            } catch (e) { /* ignore */ }
            return Array.from({ length: TOTAL }, (_, i) => i + 1);
        }
        function saveLayout() { localStorage.setItem('rcv_layout', JSON.stringify(seatLayout)); }

        function setLayout(cols) {
            gridCols = cols;
            el('seatGrid').style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            el('btn13x10').classList.toggle('active', cols === 13);
            el('btn10x13').classList.toggle('active', cols === 10);
            renderGrid();
        }

        function toggleEditMode() {
            editMode = !editMode;
            const btn = el('editBtn');
            const rst = el('resetBtn');
            el('seatGrid').classList.toggle('edit-mode-on', editMode);
            if (editMode) {
                btn.textContent = '✅ Xong sắp xếp';
                btn.classList.add('editing');
                rst.classList.remove('d-none');
            } else {
                btn.textContent = '✏️ Sắp xếp';
                btn.classList.remove('editing');
                rst.classList.add('d-none');
                saveLayout();
            }
            renderGrid();
        }

        function resetLayout() {
            if (!confirm('Đặt lại thứ tự ghế về mặc định (1–130)?')) return;
            seatLayout = Array.from({ length: TOTAL }, (_, i) => i + 1);
            saveLayout();
            renderGrid();
        }

        /* ============ FIREBASE ============ */
        let teamsCache = {};
        let gameCache = null;
        let countdownTimer = null;
        let lastQPhaseKey = null; // prevents timer restart on team updates

        db.ref('teams').on('value', snap => {
            teamsCache = snap.val() || {};
            updateStats();
            if (gameCache) renderGrid(gameCache.currentQuestionIndex, gameCache.phase);
            else renderGrid();
        });

        db.ref('game').on('value', snap => {
            gameCache = snap.val();
            render(gameCache);
        });

        function updateStats() {
            const all = Object.values(teamsCache);
            const joined  = all.filter(t => t.status && t.status !== 'not_joined').length;
            const alive   = all.filter(t => t.status === 'alive' || t.status === 'winner').length;
            const dead    = all.filter(t => t.status === 'eliminated').length;
            el('statJoined').textContent = joined;
            el('statAlive').textContent  = alive;
            el('statDead').textContent   = dead;
            el('lobbyCount').textContent = `${joined} / 130 thí sinh đã đăng nhập`;
        }

        /* ============ RENDER PHASE ============ */
        function render(g) {
            if (!g || !g.phase || g.phase === 'lobby') { renderLobby(); return; }
            if (g.phase === 'read_question' || g.phase === 'question') { renderQuestion(g); return; }
            if (g.phase === 'result') { renderResult(g); return; }
            if (g.phase === 'finished') { renderFinished(g); return; }
        }

        function showMain(id) {
            ['lobbyView', 'questionView', 'finishedView'].forEach(v =>
                el(v).classList.toggle('d-none', v !== id));
        }

        function setPhaseChip(label, cls) {
            const c = el('phaseChip');
            c.textContent = label;
            c.className = 'phase-chip ' + cls;
        }

        /* LOBBY */
        function renderLobby() {
            clearInterval(countdownTimer); countdownTimer = null;
            setPhaseChip('Phòng chờ', 'chip-lobby');
            showMain('lobbyView');
            updateStats();
            renderGrid();
        }

        /* QUESTION / READ_QUESTION */
        function renderQuestion(g) {
            const phaseKey = g.phase + ':' + g.currentQuestionIndex;
            const isNew = phaseKey !== lastQPhaseKey;

            const q = QUESTIONS[g.currentQuestionIndex];
            if (!q) return;

            if (isNew) {
                lastQPhaseKey = phaseKey;
                clearInterval(countdownTimer); countdownTimer = null;

                el('qText').textContent = q.text;
                el('optA').textContent = 'A.  ' + q.options.A;
                el('optB').textContent = 'B.  ' + q.options.B;
                el('optC').textContent = 'C.  ' + q.options.C;
                el('optD').textContent = 'D.  ' + q.options.D;
                ['A','B','C','D'].forEach(k => el('opt'+k).classList.remove('reveal-correct'));
                el('resultBar').classList.add('d-none');
            }

            setPhaseChip('Câu ' + (g.currentQuestionIndex + 1), 'chip-q');
            showMain('questionView');

            if (g.phase === 'read_question') {
                el('bigTimer').textContent = 'Chuẩn bị...';
                el('bigTimer').style.fontSize = '34px';
                el('bigTimer').classList.remove('urgent');
                el('answeredLine').classList.add('d-none');
            } else {
                el('bigTimer').style.fontSize = '72px';
                el('answeredLine').classList.remove('d-none');

                const timeLimit = g.timeLimit || 10;
                const tick = () => {
                    const left = Math.max(0, Math.ceil(timeLimit - (Date.now() - g.startedAt) / 1000));
                    el('bigTimer').textContent = left;
                    el('bigTimer').classList.toggle('urgent', left <= 3);
                };
                if (isNew) { tick(); countdownTimer = setInterval(tick, 200); }

                // Update answered count (runs on every call, including team updates)
                const alive = Object.values(teamsCache).filter(t => t.status === 'alive');
                const answered = alive.filter(t => t.answers && t.answers[g.currentQuestionIndex]);
                el('answeredLine').textContent = `${answered.length} / ${alive.length} thí sinh đã trả lời`;
            }

            renderGrid(g.currentQuestionIndex, g.phase);
        }

        /* RESULT */
        function renderResult(g) {
            clearInterval(countdownTimer); countdownTimer = null;
            lastQPhaseKey = null;

            const q = QUESTIONS[g.currentQuestionIndex];
            if (q) {
                el('qText').textContent = q.text;
                el('optA').textContent = 'A.  ' + q.options.A;
                el('optB').textContent = 'B.  ' + q.options.B;
                el('optC').textContent = 'C.  ' + q.options.C;
                el('optD').textContent = 'D.  ' + q.options.D;
                ['A','B','C','D'].forEach(k => el('opt'+k).classList.remove('reveal-correct'));
                el('opt' + q.correct).classList.add('reveal-correct');
                el('bigTimer').textContent = '';
                el('bigTimer').style.fontSize = '72px';
                el('bigTimer').classList.remove('urgent');
            }

            const teams = Object.values(teamsCache);
            const alive     = teams.filter(t => t.status === 'alive' || t.status === 'winner');
            const dead      = teams.filter(t => t.status === 'eliminated');
            const newDead   = teams.filter(t => t.status === 'eliminated' && t.eliminatedAtQuestion === g.currentQuestionIndex + 1);
            el('rbAlive').textContent = alive.length;
            el('rbDead').textContent  = dead.length;
            el('rbNow').textContent   = newDead.length;

            el('answeredLine').classList.add('d-none');
            el('resultBar').classList.remove('d-none');
            setPhaseChip('Kết quả', 'chip-result');
            showMain('questionView');
            renderGrid(g.currentQuestionIndex, 'result');
        }

        /* FINISHED */
        function renderFinished(g) {
            clearInterval(countdownTimer); countdownTimer = null;
            const winner = g.winnerCode ? teamsCache[g.winnerCode] : null;
            el('winName').textContent = winner ? (winner.displayName || '') : '';
            el('winUnit').textContent = winner ? (winner.unit || '') : '';
            setPhaseChip('Kết thúc', 'chip-end');
            showMain('finishedView');
            renderGrid();
        }

        /* ============ SEAT GRID RENDER ============ */
        function renderGrid(highlightQIdx, phase) {
            const container = el('seatGrid');
            container.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;

            // Build code→team lookup
            const byCode = {};
            Object.entries(teamsCache).forEach(([code, t]) => { byCode[code] = t; });

            const html = seatLayout.map((seatNum, pos) => {
                const padded = String(seatNum).padStart(3, '0');
                const code = 'xh' + padded;
                const t = byCode[code] || null;
                const name   = t ? (t.displayName || '') : '';
                const unit   = t ? (t.unit || '') : '';
                const status = t ? (t.status || 'not_joined') : 'not_joined';

                let extraClass = '';
                if (status === 'alive') {
                    if (phase === 'question') {
                        const answered = t && highlightQIdx !== undefined && t.answers && t.answers[highlightQIdx];
                        extraClass = answered ? 'answered' : 'unanswered';
                    }
                } else if (status === 'eliminated') {
                    if (phase === 'result' && t && t.eliminatedAtQuestion === highlightQIdx + 1) {
                        extraClass = 'died-this-round';
                    }
                }

                const draggable = editMode ? 'draggable="true"' : '';
                return `<div class="seat-cell ${status} ${extraClass}"
                             ${draggable}
                             data-pos="${pos}" data-seat="${seatNum}">
                    <div class="cell-num">${seatNum}</div>
                    ${name ? `<div class="cell-name">${escHtml(name)}</div>` : ''}
                    ${unit ? `<div class="cell-unit">${escHtml(unit)}</div>` : ''}
                </div>`;
            }).join('');

            container.innerHTML = html;
            if (editMode) setupDragDrop(container);
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        /* ============ DRAG & DROP ============ */
        function setupDragDrop(container) {
            let dragPos = null;

            container.querySelectorAll('.seat-cell').forEach(cell => {
                cell.addEventListener('dragstart', e => {
                    dragPos = parseInt(cell.dataset.pos);
                    setTimeout(() => cell.classList.add('dragging'), 0);
                    e.dataTransfer.effectAllowed = 'move';
                });
                cell.addEventListener('dragend', () => {
                    cell.classList.remove('dragging');
                });
                cell.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    cell.classList.add('drag-over');
                });
                cell.addEventListener('dragleave', () => {
                    cell.classList.remove('drag-over');
                });
                cell.addEventListener('drop', e => {
                    e.preventDefault();
                    cell.classList.remove('drag-over');
                    const toPos = parseInt(cell.dataset.pos);
                    if (dragPos !== null && dragPos !== toPos) {
                        [seatLayout[dragPos], seatLayout[toPos]] = [seatLayout[toPos], seatLayout[dragPos]];
                        renderGrid();
                    }
                    dragPos = null;
                });
            });
        }

        /* ============ INIT ============ */
        setLayout(13);
    </script>
</body>
